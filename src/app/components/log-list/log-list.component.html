<div class="log-dashboard">
  <h1>Dashboard logów</h1>

  <div class="filters-panel">
    <form [formGroup]="filterForm" class="filters-form">
      <div class="filter-row">
        <mat-form-field appearance="outline">
          <mat-label>Usługa</mat-label>
          <mat-select formControlName="serviceName">
            <mat-option value="">Wszystkie</mat-option>
            <mat-option *ngFor="let service of services" [value]="service">
              {{ service }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Poziom</mat-label>
          <mat-select formControlName="level">
            <mat-option value="">Wszystkie</mat-option>
            <mat-option *ngFor="let level of logLevels" [value]="level">
              {{ level }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Szukaj w treści</mat-label>
          <input matInput formControlName="searchText" placeholder="wpisz frazę...">
        </mat-form-field>
      </div>

      <div class="filter-row">
        <mat-form-field appearance="outline">
          <mat-label>Od daty</mat-label>
          <input matInput [matDatepicker]="fromPicker" formControlName="fromDate">
          <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
          <mat-datepicker #fromPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Do daty</mat-label>
          <input matInput [matDatepicker]="toPicker" formControlName="toDate">
          <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
          <mat-datepicker #toPicker></mat-datepicker>
        </mat-form-field>

        <button mat-raised-button color="primary" type="button" (click)="clearFilters()">
          Wyczyść filtry
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Error message -->
  <div *ngIf="error" class="error-message">
    <mat-error>{{ error }}</mat-error>
  </div>

  <!-- Logs table -->
  <div *ngIf="!loading && !error" class="logs-table-container">
    <table mat-table [dataSource]="logs" class="logs-table">

      <!-- Timestamp column -->
      <ng-container matColumnDef="timestamp">
        <th mat-header-cell *matHeaderCellDef> Czas </th>
        <td mat-cell *matCellDef="let log"> {{(log.timestamp) }} </td>
      </ng-container>

      <!-- Service column -->
      <ng-container matColumnDef="service">
        <th mat-header-cell *matHeaderCellDef> Usługa </th>
        <td mat-cell *matCellDef="let log"> {{ log.serviceName }} </td>
      </ng-container>

      <!-- Level column -->
      <ng-container matColumnDef="level">
        <th mat-header-cell *matHeaderCellDef> Poziom </th>
        <td mat-cell *matCellDef="let log">
          <span class="level-badge" [ngClass]="'level-' + log.level.toLowerCase()">
            {{ log.level }}
          </span>
        </td>
      </ng-container>

      <!-- Message column -->
      <ng-container matColumnDef="message">
        <th mat-header-cell *matHeaderCellDef> Wiadomość </th>
        <td mat-cell *matCellDef="let log">
          <div class="message-cell">
            {{ log.message }}
            <button *ngIf="hasException(log)"
                    mat-icon-button
                    (click)="(log)"
                    matTooltip="Pokaż szczegóły błędu">
              <mat-icon>error_outline</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <!-- Host column -->
      <ng-container matColumnDef="host">
        <th mat-header-cell *matHeaderCellDef> Host </th>
        <td mat-cell *matCellDef="let log"> {{ log.hostName }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <!-- Pagination -->
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons>
    </mat-paginator>
  </div>

  <!-- No logs message -->
  <div *ngIf="!loading && !error && logs.length === 0" class="no-logs">
    <p>Brak logów spełniających kryteria.</p>
  </div>
</div>
