<div style="padding: 20px;">
  <h1>Logs</h1>

  <div *ngIf="loading">Import data</div>

  <div *ngIf="error" style="color: red; padding: 10px; background: #ffeeee;">
    {{ error }}
  </div>

  <table *ngIf="!loading && !error" border="1" style="width: 100%; border-collapse: collapse;">
    <thead style="background: #f0f0f0;">
    <tr>
      <th>Time</th>
      <th>Level</th>
      <th>Service</th>
      <th>Host</th>
      <th>Message</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let log of logs"
        [style.background]="log.level === 'ERROR' ? '#ffebee' :
                              log.level === 'WARN' ? '#fff3e0' : 'white'">
      <td>{{ log.timestamp | date:'yyyy-MM-dd HH:mm:ss' }}</td>
      <td>
          <span style="padding: 2px 8px; border-radius: 4px;
                      background: log.level === 'ERROR' ? '#f44336' :
                                 log.level === 'WARN' ? '#ff9800' :
                                 log.level === 'INFO' ? '#2196f3' : '#9e9e9e';
                      color: white;">
            {{ log.level }}
          </span>
      </td>
      <td>{{ log.serviceName }}</td>
      <td>{{ log.hostName }}</td>
      <td>{{ log.message }}</td>
    </tr>
    </tbody>
  </table>
</div>
